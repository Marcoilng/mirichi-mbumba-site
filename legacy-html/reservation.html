<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réserver une session — Mirichi Mbumba</title>
  <meta name="description" content="Type de session, calendrier et créneaux (maquette).">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="_shared.css">
</head>

<body>

  <div id="mm-nav-root"></div>

  <main class="page-shell">
    <section class="section-alt py-14 px-6 lg:px-12">
      <div class="max-w-7xl mx-auto">
        <p class="breadcrumb mb-4"><a href="index.html">Accueil</a> · Réservation</p>
        <h1 style="font-size:clamp(2rem,3vw,2.75rem);font-weight:300">Réserver une <span
            style="color:var(--gold-light);font-style:italic">session</span></h1>
        <p style="color:var(--muted);margin-top:0.5rem">Intégration Calendly / Cal.com possible ici.</p>
      </div>
    </section>
    <section class="section-main py-10 px-6 lg:px-12">
      <form id="booking-form" class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-10">
        <!-- Type selection -->
        <div class="space-y-4 reveal order-2 lg:order-1">
          <p class="section-label">Type de session</p>

          <label class="card-dark p-4 flex gap-3 cursor-pointer" style="align-items:flex-start">
            <input type="radio" name="sess" value="Session découverte (30 min - gratuit)" checked>
            <div>
              <strong>Session découverte</strong>
              <p style="font-size:0.85rem;color:var(--muted)">30 min · gratuit</p>
            </div>
          </label>

          <label class="card-dark p-4 flex gap-3 cursor-pointer" style="align-items:flex-start">
            <input type="radio" name="sess" value="Coaching individuel (90 min - 175€)">
            <div>
              <strong>Coaching individuel</strong>
              <p style="font-size:0.85rem;color:var(--muted)">90 min · 175€</p>
            </div>
          </label>

          <label class="card-dark p-4 flex gap-3 cursor-pointer" style="align-items:flex-start">
            <input type="radio" name="sess" value="Stratégie business (2h - 290€)">
            <div>
              <strong>Stratégie business</strong>
              <p style="font-size:0.85rem;color:var(--muted)">2h · 290€</p>
            </div>
          </label>

          <label class="card-dark p-4 flex gap-3 cursor-pointer" style="align-items:flex-start">
            <input type="radio" name="sess" value="Audit organisationnel (sur devis)">
            <div>
              <strong>Audit organisationnel</strong>
              <p style="font-size:0.85rem;color:var(--muted)">Demi-journée · sur devis</p>
            </div>
          </label>
        </div>

        <!-- Date, slot and contact details -->
        <div class="reveal reveal-delay-2 order-1 lg:order-2 space-y-4">
          <div class="book-cover mb-4" style="border-radius:4px;overflow:hidden;max-height:220px">
            <img src="images/livre-chrepreneur.png" alt="Réserver une session — Mirichi Mbumba"
              style="width:100%;height:100%;object-fit:cover;min-height:150px" loading="lazy" width="480"
              height="320" />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="form-label">Sélectionner la Date</label>
              <input type="date" id="res-date" class="form-input" style="background-color: var(--dark-3);" required>
            </div>
            <div>
              <label class="form-label">Créneau horaire</label>
              <div class="grid grid-cols-2 gap-2" id="slot-grid-container">
                <button type="button"
                  class="form-input slot-btn sel text-center py-2.5 font-semibold text-xs border border-amber-600/30"
                  data-time="09:00">09:00</button>
                <button type="button"
                  class="form-input slot-btn text-center py-2.5 font-semibold text-xs border border-transparent"
                  data-time="11:30">11:30</button>
                <button type="button"
                  class="form-input slot-btn text-center py-2.5 font-semibold text-xs border border-transparent"
                  data-time="15:00">15:00</button>
                <button type="button"
                  class="form-input slot-btn text-center py-2.5 font-semibold text-xs border border-transparent"
                  data-time="17:30">17:30</button>
              </div>
            </div>
          </div>

          <!-- Contact Info -->
          <div class="grid grid-cols-2 gap-3 pt-2">
            <div>
              <label class="form-label">Prénom</label>
              <input type="text" id="res-firstname" class="form-input" placeholder="Jean" required>
            </div>
            <div>
              <label class="form-label">Nom</label>
              <input type="text" id="res-lastname" class="form-input" placeholder="Dupont" required>
            </div>
          </div>
          <div>
            <label class="form-label">Email</label>
            <input type="email" id="res-email" class="form-input" placeholder="vous@email.com" required>
          </div>

          <p style="font-size:0.78rem;color:var(--muted);" class="mt-2">Fuseau : Africa/Kinshasa (Gmt+1).</p>
          <button type="submit" class="btn-gold w-full mt-4" style="padding:14px;font-size:0.75rem">Confirmer ma
            Réservation</button>
          <p style="font-size:0.72rem;color:var(--muted);margin-top:0.75rem">Après confirmation : un email récapitulatif
            avec lien visio (Zoom / Meet) sera configuré par notre secrétariat.</p>
        </div>
      </form>
    </section>
  </main>

  <div id="mm-footer-root"></div>
  <div id="mm-cart-root"></div>
  <script src="site-chrome.js"></script>
  <script src="_shared.js"></script>
  <script src="db-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Prevent past dates in input
      const dateInput = document.getElementById('res-date');
      const today = new Date().toISOString().split('T')[0];
      if (dateInput) {
        dateInput.setAttribute('min', today);
        dateInput.value = today;
      }

      // Slot grid selection management
      let selectedSlotTime = "09:00";
      const slotButtons = document.querySelectorAll('.slot-btn');

      slotButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          slotButtons.forEach(b => {
            b.classList.remove('sel');
            b.style.borderColor = 'transparent';
          });
          btn.classList.add('sel');
          btn.style.borderColor = 'var(--gold)';
          selectedSlotTime = btn.getAttribute('data-time');
        });
      });

      // Submit listener
      const bookingForm = document.getElementById('booking-form');
      if (bookingForm) {
        bookingForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const btnSubmit = bookingForm.querySelector('button[type="submit"]');
          const originalText = btnSubmit.textContent;
          btnSubmit.textContent = "Réservation en cours...";
          btnSubmit.disabled = true;

          // Find selected radio value
          const radios = document.getElementsByName('sess');
          let sessionTypeVal = "Session découverte";
          for (const r of radios) {
            if (r.checked) {
              sessionTypeVal = r.value;
              break;
            }
          }

          const data = {
            session_type: sessionTypeVal,
            date: document.getElementById('res-date').value,
            time: selectedSlotTime,
            first_name: document.getElementById('res-firstname').value.trim(),
            last_name: document.getElementById('res-lastname').value.trim(),
            email: document.getElementById('res-email').value.trim(),
            zoom_link: "",
            status: "confirmée"
          };

          try {
            if (window.supabaseDb) {
              await window.supabaseDb.saveReservation(data);
              alert(`Votre demande de coaching (${sessionTypeVal}) a été validée avec succès pour le ${data.date} à ${data.time}.\n\nVous recevrez un courriel de confirmation sous peu.`);
              bookingForm.reset();
              if (dateInput) dateInput.value = today;
            } else {
              throw new Error("Base de données non initialisée");
            }
          } catch (err) {
            alert("Erreur lors de l'enregistrement de votre réservation : " + err.message);
          } finally {
            btnSubmit.textContent = originalText;
            btnSubmit.disabled = false;
          }
        });
      }
    });
  </script>
</body>

</html>
